<section class="dashboard-page">
  <app-dashboard-banner></app-dashboard-banner>
  <div class="container">
    <app-input-icon (onInputChange)="onSearchChange($event)"></app-input-icon>
  </div>
  <app-game-category-buttons
    (categorySelected)="updateCategorySelected($event)"
  ></app-game-category-buttons>
  <app-game-category-wrapper
    *ngFor="let categoriy of allGameCategories"
    [category]="categoriy"
    [query]="searchValue"
    [categorySelected]="categorySelected"
  >
  </app-game-category-wrapper>
</section>
