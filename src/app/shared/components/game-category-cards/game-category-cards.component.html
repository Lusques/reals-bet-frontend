<div class="category-cards">
  <ul class="category-cards__list">
    <li
      class="category-cards__item"
      *ngFor="let game of games; trackBy: getTrackByCardId"
    >
      <a>
        <figure class="category-cards__figure">
          <img [src]="game.imageUrl" [alt]="game.altText" />
        </figure>
      </a>
    </li>
  </ul>
</div>
