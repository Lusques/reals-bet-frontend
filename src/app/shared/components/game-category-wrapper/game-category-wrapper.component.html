<div *ngIf="hasVisibleGame">
  <div class="container">
    <app-game-category-header
      [category]="category"
      [isExpanded]="showAllGames"
      (onButtonClick)="toggleShowAllGames()"
    ></app-game-category-header>
  </div>
  <app-game-category-cards
    [games]="queryGames()"
    [showAllGames]="showAllGames"
  ></app-game-category-cards>
</div>
